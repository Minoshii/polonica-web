<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Polonica">
<meta name="theme-color" content="#c8b89a">
<title>Polonica</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<style>
:root{--bg:#0c0c0c;--surface:#111;--surface2:#161616;--surface3:#1c1c1c;--border:#222;--border2:#2a2a2a;--accent:#c8b89a;--accent-dim:#6b5d48;--accent-bg:#1a160e;--text:#e8e6e1;--text2:#888;--text3:#444;--green:#4a9a6a;--green-bg:#0d2017;--red:#c05050;--red-bg:#200d0d;--blue:#5080c0;--blue-bg:#0d1a30;--purple:#9060c0;--purple-bg:#1a0d30;--pink:#c060a0;--pink-bg:#1a0d16;--teal:#3a9a8a;--teal-bg:#0d1e1c;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Syne',sans-serif;background:var(--bg);color:var(--text);display:flex;height:100vh;overflow:hidden;}
#sidebar{width:210px;min-width:210px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;padding:16px 10px 12px;overflow-y:auto;}
.logo{font-size:20px;font-weight:800;color:var(--accent);padding:0 8px;margin-bottom:20px;letter-spacing:-0.5px;}
.nav-section{font-size:10px;font-weight:700;color:var(--text3);letter-spacing:.1em;text-transform:uppercase;padding:0 8px;margin:10px 0 4px;}
.nav-btn{width:100%;padding:8px 12px;background:none;border:none;color:var(--text2);text-align:left;cursor:pointer;border-radius:8px;margin-bottom:2px;font-family:'Syne',sans-serif;font-size:13px;font-weight:600;display:flex;align-items:center;gap:9px;transition:all .15s;}
.nav-btn:active{transform:scale(.97);opacity:.7;}
.nav-btn:hover{background:var(--surface2);color:var(--text);}
.nav-btn.active{background:var(--surface3);color:var(--accent);}
.sidebar-footer{margin-top:auto;padding:10px 8px 0;border-top:1px solid var(--border);}
.footer-btns{display:flex;gap:5px;margin-bottom:8px;}
.footer-btn{flex:1;padding:5px 4px;background:none;border:1px solid var(--border);color:var(--text3);border-radius:6px;cursor:pointer;font-family:'Syne',sans-serif;font-size:10px;font-weight:600;transition:all .15s;text-align:center;}
.footer-btn:hover{border-color:var(--accent-dim);color:var(--accent);}
.ollama-dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--text3);margin-right:5px;}
.ollama-dot.ok{background:var(--green);}
#word-count{padding:0 8px;margin-top:8px;}
#main{flex:1;overflow-y:auto;display:flex;flex-direction:column;}
.panel{display:none;padding:26px 30px;flex:1;animation:panelIn .25s cubic-bezier(.22,.68,0,1.2);}
@keyframes panelIn{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
.panel.active{display:flex;flex-direction:column;}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.panel-title{font-size:22px;font-weight:800;margin-bottom:4px;letter-spacing:-0.5px;}
.panel-sub{font-size:13px;color:var(--text2);margin-bottom:18px;}
.mode-badge{display:inline-block;font-size:10px;font-weight:700;padding:2px 8px;border-radius:99px;letter-spacing:.06em;text-transform:uppercase;margin-left:8px;vertical-align:middle;}
.badge-lesson{background:var(--blue-bg);color:#7090d0;border:1px solid var(--blue);}
.badge-lyrics{background:var(--purple-bg);color:#b080e0;border:1px solid var(--purple);}
input[type=text],textarea,select{width:100%;background:var(--surface2);border:1px solid var(--border);color:var(--text);border-radius:8px;font-family:'Syne',sans-serif;font-size:13px;padding:10px 13px;margin-bottom:10px;transition:border-color .15s;}
input[type=text]:focus,textarea:focus,select:focus{outline:none;border-color:var(--accent-dim);}
textarea{height:130px;resize:vertical;font-family:'DM Mono',monospace;font-size:12px;}
.btn{padding:9px 16px;border-radius:8px;border:1px solid var(--border2);background:var(--surface2);color:var(--text);font-family:'Syne',sans-serif;font-size:13px;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;gap:6px;transition:all .12s;}
.btn:active{transform:scale(.95);opacity:.8;}
.btn:hover{background:var(--surface3);border-color:#333;}
.btn:disabled{opacity:.4;cursor:default;}
.btn-accent{border-color:var(--accent-dim);color:var(--accent);background:transparent;}
.btn-green{border-color:var(--green);color:#6dbf9a;background:var(--green-bg);}
.btn-blue{border-color:var(--blue);color:#7090d0;background:var(--blue-bg);}
.btn-purple{border-color:var(--purple);color:#b080e0;background:var(--purple-bg);}
.btn-red{border-color:var(--red);color:#e07070;background:var(--red-bg);}
.btn-pink{border-color:var(--pink);color:#e090c0;background:var(--pink-bg);}
.btn-teal{border-color:var(--teal);color:#5dc0b0;background:var(--teal-bg);}
.category-section{margin-top:16px;margin-bottom:20px;}
.category-title{font-size:13px;font-weight:800;color:var(--accent);margin-bottom:10px;border-bottom:1px solid var(--border2);padding-bottom:8px;text-transform:uppercase;display:flex;align-items:center;}
.word-card{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:12px 14px;margin-bottom:6px;cursor:pointer;transition:all .15s;}
.word-card:hover{border-color:var(--border2);background:var(--surface3);}
.word-card.selected{border-color:var(--accent-dim);background:var(--accent-bg);}
.word-card-header{display:flex;align-items:center;gap:8px;margin-bottom:4px;flex-wrap:wrap;}
.word-pl{font-size:16px;font-weight:700;}
.word-orig{font-size:11px;color:var(--text3);font-family:'DM Mono',monospace;background:var(--surface3);border-radius:4px;padding:1px 6px;}
.word-inflected{font-size:13px;color:var(--text3);font-family:'DM Mono',monospace;font-weight:400;margin-left:1px;}
.word-type-badge{font-size:10px;font-weight:700;padding:2px 7px;border-radius:99px;border:1px solid;letter-spacing:.04em;text-transform:uppercase;}
.word-en{font-size:11px;color:var(--text3);margin-left:auto;font-family:'DM Mono',monospace;}
.word-tr-main{font-size:13px;color:var(--accent);font-weight:600;}
.word-example{margin-top:6px;padding-top:6px;border-top:1px solid var(--border);display:flex;flex-direction:column;gap:2px;}
.ex-pl{font-size:11px;color:var(--text2);font-family:'DM Mono',monospace;font-style:italic;line-height:1.5;}
.ex-tr{font-size:11px;color:var(--text3);line-height:1.5;}
#save-bar{position:fixed;bottom:0;left:210px;right:0;background:var(--surface);border-top:1px solid var(--border);padding:11px 30px;display:none;align-items:center;gap:10px;z-index:100;}
#save-bar.visible{display:flex;}
.prog-bar{height:4px;background:var(--border);border-radius:99px;margin-bottom:20px;overflow:hidden;}
.prog-fill{height:100%;background:var(--accent);transition:width .3s ease;}
.unit-prog-bar{height:2px;background:var(--border);border-radius:99px;margin-bottom:8px;}
.unit-prog-fill{height:100%;background:var(--accent);border-radius:99px;}
.flashcard{border:1px solid var(--border);border-radius:16px;background:var(--surface2);padding:40px;text-align:center;cursor:pointer;min-height:200px;display:flex;flex-direction:column;justify-content:center;margin-bottom:20px;transition:all .2s;}
.flashcard:hover{border-color:var(--accent-dim);}
.mc-opts{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.mc-opt{padding:15px;border-radius:10px;border:1px solid var(--border);background:var(--surface2);cursor:pointer;text-align:left;font-family:'Syne',sans-serif;font-size:13px;font-weight:600;color:var(--text);transition:all .2s;}
.mc-opt:hover{border-color:var(--border2);}
.mc-opt.correct{background:var(--green-bg);border-color:var(--green);color:#6dbf9a;}
.mc-opt.wrong{background:var(--red-bg);border-color:var(--red);color:#e07070;}
.srs-badge{display:inline-block;font-size:10px;padding:1px 6px;border-radius:99px;background:#2a1a08;color:#c8a050;border:1px solid #6b4a10;margin-left:6px;}
.unit-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:12px;padding:4px 0;}
.unit-card{background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:16px;cursor:pointer;transition:all .15s;}
.unit-card:hover{border-color:var(--accent-dim);}
.unit-name{font-size:14px;font-weight:700;margin-bottom:4px;}
.unit-meta{font-size:12px;color:var(--text2);margin-bottom:10px;}
.unit-actions{margin-top:10px;display:flex;gap:6px;}
.back-row{display:flex;align-items:center;gap:12px;margin-bottom:18px;}
.back-row h2{flex:1;font-size:16px;font-weight:700;}
.dict-word{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border:1px solid var(--border);border-radius:8px;margin-bottom:6px;background:var(--surface2);cursor:pointer;transition:all .15s;}
.dict-word:hover{border-color:var(--accent-dim);}
.dw-info{font-size:13px;}
.dw-prog{font-size:12px;color:var(--text2);white-space:nowrap;}
.search-row{display:flex;gap:8px;margin-bottom:14px;}
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:24px;}
.stat-card{background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:16px;text-align:center;}
.stat-num{font-size:28px;font-weight:800;margin-bottom:4px;}
.stat-lbl{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;}
.chart-wrap{background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:20px;}
.chart-title{font-size:12px;font-weight:700;color:var(--accent);margin-bottom:14px;text-transform:uppercase;letter-spacing:.06em;}
.missed-row{display:flex;align-items:center;gap:10px;padding:8px 12px;background:var(--surface3);border-radius:8px;margin-bottom:5px;}
.missed-pl{font-size:14px;font-weight:700;flex:1;}
.pdf-layout{display:flex;gap:16px;flex:1;min-height:0;}
.pdf-list-col{width:200px;min-width:200px;display:flex;flex-direction:column;gap:8px;overflow-y:auto;}
.pdf-item{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:12px;cursor:pointer;transition:all .15s;}
.pdf-item:hover{border-color:var(--accent-dim);}
.pdf-item.active-pdf{border-color:var(--accent-dim);background:var(--accent-bg);}
.pdf-item-name{font-size:12px;font-weight:700;margin-bottom:4px;word-break:break-word;line-height:1.4;}
.pdf-item-date{font-size:10px;color:var(--text3);}
.pdf-viewer-col{flex:1;display:flex;flex-direction:column;min-width:0;}
.pdf-toolbar{display:flex;align-items:center;gap:8px;margin-bottom:10px;flex-wrap:wrap;}
.pdf-canvas-wrap{flex:1;overflow:auto;background:#1a1a1a;border-radius:10px;border:1px solid var(--border);display:flex;align-items:flex-start;justify-content:center;padding:20px;min-height:500px;position:relative;}
.pdf-page-container{position:relative;display:inline-block;box-shadow:0 4px 24px rgba(0,0,0,.6);border-radius:4px;}
#pdf-canvas{display:block;border-radius:4px;}
#pdf-text-layer{position:absolute;top:0;left:0;right:0;bottom:0;overflow:hidden;opacity:1;line-height:1;pointer-events:auto;}
#pdf-text-layer span{color:transparent;position:absolute;white-space:pre;cursor:text;transform-origin:0% 0%;}
#pdf-text-layer ::selection{background:rgba(200,184,154,.35);color:transparent;}
/* PDF ANNOTATION */
.annot-toolbar{display:flex;align-items:center;gap:6px;padding:8px 12px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;margin-bottom:8px;flex-wrap:wrap;}
.annot-tool-btn{padding:6px 10px;border-radius:7px;border:1px solid transparent;background:none;color:var(--text2);cursor:pointer;font-size:13px;transition:all .15s;display:flex;align-items:center;gap:4px;font-family:'Syne',sans-serif;font-size:12px;font-weight:600;}
.annot-tool-btn:hover{background:var(--surface3);border-color:var(--border2);}
.annot-tool-btn.active{background:var(--accent-bg);border-color:var(--accent-dim);color:var(--accent);}
.annot-color-btn{width:22px;height:22px;border-radius:50%;border:3px solid transparent;cursor:pointer;transition:all .15s;flex-shrink:0;}
.annot-color-btn.active{border-color:#fff;transform:scale(1.2);}
.annot-size-slider{width:70px;accent-color:var(--accent);cursor:pointer;}
.annot-sep{width:1px;height:20px;background:var(--border2);margin:0 2px;}
#pdf-annot-canvas{position:absolute;top:0;left:0;border-radius:4px;touch-action:none;}
.annot-toolbar-wrap{display:none;}
.annot-toolbar-wrap.visible{display:flex;}
.pdf-selection-tooltip{position:fixed;background:#1a160e;border:1px solid #c8b89a;border-radius:10px;padding:8px 12px;display:none;z-index:1000;box-shadow:0 4px 20px rgba(0,0,0,.5);gap:8px;align-items:center;}
.pdf-selection-tooltip.visible{display:flex;}
.sel-mode-active{cursor:crosshair!important;}
.sel-mode-active *{cursor:crosshair!important;}
#sel-mode-btn.active{background:#2a1a08;border-color:#c8a050;color:#c8a050;box-shadow:0 0 8px #c8a05044;}
.pdf-ocr-loading{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:#1a160e;border:1px solid #c8b89a;border-radius:12px;padding:20px 28px;z-index:1001;font-family:'Syne',sans-serif;font-size:14px;color:#c8b89a;display:flex;align-items:center;gap:12px;box-shadow:0 8px 32px rgba(0,0,0,.6);}
.pdf-empty{display:flex;align-items:center;justify-content:center;height:200px;color:var(--text3);font-size:14px;}
.pdf-page-info{font-size:12px;color:var(--text2);font-family:'DM Mono',monospace;}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);display:flex;align-items:center;justify-content:center;z-index:200;}
.modal-box{background:var(--surface);border:1px solid var(--border2);border-radius:16px;padding:28px;width:600px;max-width:95vw;max-height:80vh;overflow-y:auto;}
.modal-title{font-size:18px;font-weight:800;margin-bottom:18px;display:flex;align-items:center;justify-content:space-between;}
.conj-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.conj-block{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:14px;}
.conj-block-title{font-size:10px;font-weight:700;color:var(--accent);text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px;}
.conj-row{display:flex;justify-content:space-between;padding:4px 0;font-size:13px;border-bottom:1px solid var(--border);}
.conj-row:last-child{border-bottom:none;}
.conj-pronoun{color:var(--text3);}
.conj-form{font-weight:700;font-family:'DM Mono',monospace;}
.notes-area{width:100%;background:var(--surface3);border:1px solid var(--border);border-radius:8px;padding:10px 13px;color:var(--text);font-family:'DM Mono',monospace;font-size:12px;resize:vertical;height:70px;margin-top:10px;margin-bottom:10px;}
.notes-area:focus{outline:none;border-color:var(--accent-dim);}
.spinner{width:12px;height:12px;border:2px solid var(--border2);border-top-color:var(--accent);border-radius:50%;display:inline-block;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}

/* BURAK SPECIAL */
.special-input-row{display:flex;gap:8px;margin-bottom:16px;}
.special-input-row input{flex:1;margin-bottom:0;}
.special-tabs{display:flex;gap:6px;margin-bottom:16px;}
/* EJ MAŁA */
.ejmala-input-wrap{display:flex;gap:8px;margin-bottom:20px;}
.ejmala-input{flex:1;font-size:18px;padding:14px 18px;border-radius:12px;border:2px solid #c060a0;background:var(--surface2);color:var(--text);font-family:'DM Mono',monospace;margin-bottom:0;}
.ejmala-input:focus{outline:none;border-color:#e090c0;box-shadow:0 0 0 3px #c060a022;}
.ejmala-btn{padding:14px 20px;border-radius:12px;border:2px solid #c060a0;background:#1a0d16;color:#e090c0;font-family:'Syne',sans-serif;font-size:14px;font-weight:800;cursor:pointer;transition:all .2s;white-space:nowrap;}
.ejmala-btn:hover{background:#c060a0;color:#fff;}
.ejmala-result{display:none;}
.ejmala-result.visible{display:block;}
.ejmala-base{margin-bottom:20px;padding:18px 20px;background:linear-gradient(135deg,#1a0d1e,#0d0a12);border:2px solid #c060a044;border-radius:14px;}
.ejmala-base-pl{font-size:28px;font-weight:900;color:#e090c0;font-family:'DM Mono',monospace;margin-bottom:4px;}
.ejmala-base-tr{font-size:16px;color:var(--text);margin-bottom:2px;}
.ejmala-base-en{font-size:12px;color:var(--text3);font-style:italic;}
.ejmala-section{margin-bottom:16px;}
.ejmala-section-title{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.1em;margin-bottom:10px;padding:4px 10px;border-radius:6px;display:inline-block;}
.ejmala-item{display:flex;align-items:flex-start;gap:12px;padding:10px 14px;border-radius:10px;margin-bottom:6px;cursor:pointer;transition:all .15s;position:relative;}
.ejmala-item:hover{transform:translateX(3px);}
.ejmala-item-pl{font-size:14px;font-weight:700;color:var(--text);font-family:'DM Mono',monospace;min-width:180px;}
.ejmala-item-tr{font-size:13px;color:var(--text2);flex:1;}
.ejmala-item-note{font-size:11px;color:var(--text3);font-style:italic;margin-top:2px;}
.ejmala-save-btn{font-size:10px;padding:3px 8px;border-radius:6px;border:1px solid;cursor:pointer;background:none;opacity:0;transition:opacity .15s;flex-shrink:0;font-family:'Syne',sans-serif;font-weight:700;}
.ejmala-item:hover .ejmala-save-btn{opacity:1;}

/* KELİME ACCORDION */
.word-accordion{border:1px solid var(--border);border-radius:12px;margin-bottom:10px;overflow:hidden;}
.word-accordion-header{display:flex;align-items:center;gap:10px;padding:12px 16px;cursor:pointer;background:var(--surface2);transition:background .15s;}
.word-accordion-header:hover{background:var(--surface3);}
.word-accordion.open .word-accordion-header{background:var(--surface3);}
.word-accordion-icon{font-size:18px;flex-shrink:0;}
.word-accordion-title{font-size:13px;font-weight:800;flex:1;color:var(--text);}
.word-accordion-count{font-size:11px;font-weight:700;padding:2px 9px;border-radius:99px;border:1px solid;flex-shrink:0;}
.word-accordion-arrow{font-size:11px;color:var(--text3);transition:transform .2s;}
.word-accordion.open .word-accordion-arrow{transform:rotate(180deg);}
.word-accordion-body{display:none;border-top:1px solid var(--border);}
.word-accordion.open .word-accordion-body{display:block;animation:fadeIn .15s ease;}

/* MÜZYKA */
.muzyka-album{border:1px solid #2a1a3a;border-radius:14px;margin-bottom:12px;overflow:hidden;transition:border-color .2s;}
.muzyka-album:hover{border-color:#9060c0;}
.muzyka-album.open{border-color:#9060c0;}
.muzyka-album-header{display:flex;align-items:center;gap:12px;padding:14px 16px;cursor:pointer;background:var(--surface2);transition:background .15s;}
.muzyka-album-header:hover{background:var(--surface3);}
.muzyka-album-emoji{font-size:22px;flex-shrink:0;}
.muzyka-album-info{flex:1;min-width:0;}
.muzyka-album-title{font-size:14px;font-weight:800;color:#b080e0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.muzyka-album-meta{font-size:11px;color:var(--text3);margin-top:2px;}
.muzyka-album-count{font-size:11px;font-weight:700;color:#9060c0;background:#1a0d30;padding:3px 10px;border-radius:99px;border:1px solid #3a1a5a;flex-shrink:0;}
.muzyka-album-arrow{font-size:12px;color:var(--text3);transition:transform .2s;flex-shrink:0;}
.muzyka-album.open .muzyka-album-arrow{transform:rotate(180deg);}
.muzyka-words{display:none;padding:12px 14px;background:#0d0a12;border-top:1px solid #2a1a3a;}
.muzyka-album.open .muzyka-words{display:block;animation:fadeIn .2s ease;}
.muzyka-word-row{display:flex;align-items:center;gap:10px;padding:7px 10px;border-radius:8px;cursor:pointer;transition:background .15s;margin-bottom:3px;}
.muzyka-word-row:hover{background:#1a1025;}
.muzyka-word-pl{font-size:14px;font-weight:700;color:#c8b89a;min-width:130px;}
.muzyka-word-tr{font-size:13px;color:var(--text2);flex:1;}
.muzyka-word-note{font-size:11px;color:#6b4a10;font-family:'DM Mono',monospace;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.muzyka-word-badge{font-size:10px;font-weight:700;padding:1px 7px;border-
